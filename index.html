<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#20afe2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="島開拓 v2">
  <title>島開拓ゲーム v2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="game" aria-label="島開拓ゲーム v2">
    <canvas id="gameCanvas"></canvas>

    <section class="resource-panel" aria-label="資源">
      <div class="resource-pill" id="moneyRow">
        <span class="resource-icon coin-icon" aria-hidden="true"></span>
        <span id="moneyValue">300</span>
      </div>
      <div class="resource-pill" id="woodRow">
        <span class="resource-icon wood-icon" aria-hidden="true"></span>
        <span><span id="woodValue">0</span>/<span id="woodCapacity">15</span></span>
      </div>
      <div class="resource-pill is-locked" id="stoneRow">
        <span class="resource-icon stone-icon" aria-hidden="true"></span>
        <span><span id="stoneValue">0</span>/<span id="stoneCapacity">15</span></span>
      </div>
      <div class="resource-pill is-locked" id="foodRow">
        <span class="resource-icon food-icon" aria-hidden="true"></span>
        <span><span id="foodValue">0</span>/<span id="foodCapacity">15</span></span>
      </div>
      <div class="resource-pill is-locked" id="fiberRow">
        <span class="resource-icon fiber-icon" aria-hidden="true"></span>
        <span><span id="fiberValue">0</span>/<span id="fiberCapacity">15</span></span>
      </div>
      <div class="resource-pill is-locked" id="oreRow">
        <span class="resource-icon ore-icon" aria-hidden="true"></span>
        <span><span id="oreValue">0</span>/<span id="oreCapacity">8</span></span>
      </div>
      <div class="resource-pill" id="residentRow">
        <span class="resource-icon people-icon" aria-hidden="true"></span>
        <span id="residentValue">0/2</span>
      </div>
    </section>

    <section class="mission-panel" aria-label="現在のクエスト">
      <div class="mission-eyebrow">クエスト</div>
      <div class="mission-title" id="missionTitle">木を5個集めよう</div>
      <div class="mission-meta">
        <span id="missionReward">報酬 50</span>
        <span id="missionStatus">0/5</span>
      </div>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-fill" id="missionProgress"></div>
      </div>
    </section>

    <section id="constructionPanel" class="construction-panel is-hidden" aria-live="polite">
      <div class="construction-kicker">建築予定地</div>
      <div class="construction-title" id="constructionTitle">木材倉庫</div>
      <div class="construction-materials" id="constructionMaterials"></div>
      <div class="construction-track" aria-hidden="true">
        <div class="construction-fill" id="constructionProgress"></div>
      </div>
      <div class="construction-hint" id="constructionHint">素材を持って近づこう</div>
    </section>

    <div id="toastLayer" class="toast-layer" aria-live="polite"></div>
    <div id="celebrationBanner" class="celebration-banner is-hidden" aria-live="assertive"></div>
    <div id="sellHint" class="sell-hint is-hidden">売却所</div>

    <div id="joystick" class="joystick" aria-label="移動ジョイスティック">
      <div class="joystick-ring"></div>
      <div id="joystickKnob" class="joystick-knob"></div>
    </div>

    <div class="action-stack">
      <button id="sellButton" class="game-button sell-button is-hidden" type="button">
        <span class="button-icon wood-button-icon" aria-hidden="true"></span>
        売却
      </button>
      <button id="buildButton" class="game-button build-button" type="button">
        <span class="button-icon hammer-icon" aria-hidden="true"></span>
        開拓
      </button>
      <button id="resetButton" class="game-button reset-button" type="button">リセット</button>
    </div>

    <section id="buildMenu" class="build-menu is-hidden" aria-label="開拓メニュー">
      <div class="menu-card">
        <header class="menu-header">
          <div>
            <span>島の進み具合</span>
            <h1>開拓</h1>
          </div>
          <button id="closeBuildButton" class="close-button" type="button" aria-label="閉じる">×</button>
        </header>
        <div class="upgrade-list" id="buildList"></div>
      </div>
    </section>

    <section id="endingPanel" class="ending-panel is-hidden" aria-label="v2クリア">
      <div class="ending-card">
        <div class="ending-rays" aria-hidden="true"></div>
        <strong>島開拓 v2 完了！</strong>
        <h1>港が完成した！</h1>
        <p>新しい島へ向かう準備ができました。</p>
        <span>第2島は今後のアップデートで追加予定</span>
        <button id="endingCloseButton" type="button">島を眺める</button>
      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
